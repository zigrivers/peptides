services:
  postgres:
    image: postgres:16-alpine
    container_name: peptides-postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: peptides_dev
    ports:
      # Host port 5433 (not 5432) to avoid colliding with other local Postgres
      # projects on this machine. Container still listens on 5432 internally.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
