name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Schema validate
        run: pnpm prisma:validate

      - name: Build
        run: pnpm build

      - name: Test (Unit & Integration)
        run: pnpm test

      - name: E2E (Playwright)
        run: npx playwright install --with-deps && pnpm e2e

      - name: Eval
        run: pnpm eval
        continue-on-error: true  # non-blocking on failure-to-run; threshold-blocking enforced inside the eval suite
