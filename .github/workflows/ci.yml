name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Schema validate
        run: pnpm prisma:validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Apply migrations
        run: pnpm prisma:deploy
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Test (Unit & Integration)
        run: pnpm test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: E2E (Playwright)
        run: npx playwright install --with-deps && pnpm e2e
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Eval
        run: pnpm eval
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        continue-on-error: true  # non-blocking on failure-to-run; threshold-blocking enforced inside the eval suite
